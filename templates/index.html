<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/bookmark.png">
    <title>我的书签 · 个人书签导航</title>
    <!-- 本地 Bootstrap CSS -->
    <link rel="stylesheet" href="/static/bootstrap/bootstrap.min.css">
    <!-- 本地 Font Awesome 图标库 -->
    <link rel="stylesheet" href="/static/fontawesome/css/all.min.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid h-100 p-0">
        <div class="row h-100 g-0">
            <!-- 左侧侧边栏 -->
            <div class="sidebar col-auto" id="sidebar">
                <div class="sidebar-header">
                    <span class="logo">🔖</span>
                    <span class="title">我的书签</span>
                </div>
                <div class="category-tree" id="categoryTree">
                    <div class="text-center p-4" style="color:#8fa3bc;">加载分类中...</div>
                </div>
                <div class="sidebar-footer">
                    <div class="shortcut-hint" id="shortcutHint">
                        <span class="hint-text"><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>V</kbd> 新增书签</span>
                        <span class="hint-icon"><i class="fas fa-lightbulb"></i></span>
                    </div>
                </div>
                <!-- 二级分类浮层容器 -->
                <div class="subcategory-popup" id="subcategoryPopup"></div>
            </div>

            <!-- 右侧主面板 -->
            <div class="col main-panel">
                <div class="panel-header">
                    <div class="header-left">
                        <button class="collapse-btn" id="collapseSidebarBtn">
                            <i class="fas fa-bars"></i>
                        </button>
                        <!-- 当前分类显示（已隐藏） -->
                        <span class="current-category" id="currentCategoryDisplay" style="display: none;">
                            <span class="current-icon" id="currentCategoryIcon"><i class="fas fa-home"></i></span>
                            <span id="currentCategoryName">全部</span>
                        </span>
                    </div>

                    <!-- 搜索框 -->
                    <div class="search-container">
                        <div class="search-engine-selector" id="engineSelector">
                            <span class="engine-icon" id="selectedEngineIcon"><i class="fas fa-search"></i></span>
                            <div class="engine-dropdown" id="engineDropdown"></div>
                        </div>
                        <input type="text" class="search-input" id="searchInput" placeholder="可本地搜索，快速找到书签">
                        <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                    </div>

                    <div class="header-right">
                        <button class="import-btn" id="loginBtn" title="登录">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </button>
                        <button class="import-btn" id="addBookmarkHeaderBtn" title="新增书签">
                            <i class="fas fa-plus"></i> 新增书签
                        </button>
                        <button class="import-btn" id="importBookmarksBtn" title="导入浏览器书签">
                            <i class="fas fa-upload"></i> 导入书签
                        </button>
                        <button class="import-btn" id="manageCategoriesBtn" title="管理分类">
                            <i class="fas fa-folder"></i> 书签分类
                        </button>
                        <a href="https://github.com/relimc/bookmarks" target="_blank" class="github-link">
                            <i class="fab fa-github"></i> GitHub
                        </a>
                    </div>
                </div>

                <!-- 卡片网格容器 -->
                <div class="bookmark-grid" id="bookmarkGrid">
                    <div class="loading-spinner text-center p-5" style="color:#8fa3bc;">⏳ 正在加载书签...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑模态框 (Bootstrap) -->
    <div class="modal fade" id="bookmarkModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog" style="margin-top: 30px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">📋 新增书签</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editingId" value="">

                    <div class="mb-3">
                        <label class="form-label">网址</label>
                        <input type="url" class="form-control" id="urlInput" placeholder="https:// 或 http://">
                        <div class="form-text text-muted small" id="clipboardHint"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">标题</label>
                        <input type="text" class="form-control" id="titleInput" placeholder="自动抓取或手动输入">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="descriptionInput" rows="2"></textarea>
                    </div>


                    <!-- 上级分类（仅新增分类时显示） -->
                    <div class="mb-3" id="parentCategoryGroup" style="display: none;">
                        <label class="form-label">上级分类</label>
                        <select class="form-select" id="parentCategorySelect">
                            <option value="">可选，不选则下方分类为一级分类</option>
                        </select>
                    </div>

                    <!-- 编辑模式：已有分类下拉框 -->
                    <div class="mb-3" id="existingCategoryGroup">
                        <label class="form-label">分类</label>
                        <select class="form-select" id="categorySelect">
                            <option value="">-- 选择已有分类 --</option>
                        </select>
                    </div>

                    <!-- 新增模式：分类图标选择器（初始隐藏） -->
                    <div class="mb-3" id="newCategoryIconGroup" style="display: none;">
                        <label class="form-label">分类</label>
                        <div class="custom-icon-selector">
                            <div class="selected-icon" id="selectedIconDisplay">
                                <span class="selected-icon-preview" id="selectedIconPreview"><i class="fas fa-folder"></i></span>
                                <span class="selected-icon-text" id="selectedIconText">请选择分类</span>
                                <span class="caret">▼</span>
                            </div>
                            <div class="icon-dropdown-panel" id="iconDropdownPanel">
                                <div class="icon-grid">
                                    <!-- 名词列 -->
                                    <div class="icon-column">
                                        <div class="column-header">📁 名词分类</div>
                                        <div class="icon-option" data-value="fas fa-image" data-name="图片"><i class="fas fa-image"></i> 图片</div>
                                        <div class="icon-option" data-value="fas fa-music" data-name="音乐"><i class="fas fa-music"></i> 音乐</div>
                                        <div class="icon-option" data-value="fas fa-video" data-name="视频"><i class="fas fa-video"></i> 视频</div>
                                        <div class="icon-option" data-value="fas fa-file-alt" data-name="文档"><i class="fas fa-file-alt"></i> 文档</div>
                                        <div class="icon-option" data-value="fas fa-gamepad" data-name="游戏"><i class="fas fa-gamepad"></i> 游戏</div>
                                        <div class="icon-option" data-value="fas fa-heart" data-name="收藏"><i class="fas fa-heart"></i> 收藏</div>
                                    </div>
                                    <!-- 动词列 -->
                                    <div class="icon-column">
                                        <div class="column-header">🎯 动词分类</div>
                                        <div class="icon-option" data-value="fas fa-book-open" data-name="阅读"><i class="fas fa-book-open"></i> 阅读</div>
                                        <div class="icon-option" data-value="fas fa-headphones" data-name="聆听"><i class="fas fa-headphones"></i> 聆听</div>
                                        <div class="icon-option" data-value="fas fa-eye" data-name="观看"><i class="fas fa-eye"></i> 观看</div>
                                        <div class="icon-option" data-value="fas fa-graduation-cap" data-name="学习"><i class="fas fa-graduation-cap"></i> 学习</div>
                                        <div class="icon-option" data-value="fas fa-download" data-name="下载"><i class="fas fa-download"></i> 下载</div>
                                        <div class="icon-option" data-value="fas fa-search" data-name="搜索"><i class="fas fa-search"></i> 搜索</div>
                                    </div>
                                </div>
                                <!-- 自定义输入区域 -->
                                <div class="custom-icon-input">
                                    <input type="text" id="customIconInputPanel" placeholder="类名/图标，如：电影/fas fa-film或电影/图标链接">
                                    <button type="button" id="applyCustomIcon">自定义</button>
                                </div>
                            </div>
                        </div>
                        <!-- 隐藏字段 -->
                        <input type="hidden" id="selectedIconValue" value="fas fa-folder">
                        <input type="hidden" id="selectedCategoryName" value="">
                        <input type="hidden" id="newCategoryCustomIcon" value="">
                    </div>

                    <!-- 新增分类的切换链接（放在新增图标区域附近，但在现有分类下拉框下方） -->
                    <div class="mt-2" id="toggleCategoryMode" style="cursor:pointer; color:#2563eb; display: none;">
                        ➕ 新增分类
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between align-items-center">
                    <div class="left-section">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="bookmarkPrivate">
                            <label class="form-check-label" for="bookmarkPrivate">
                                私密
                                <span class="info-icon" data-tip="勾选后，登录后才能看到此标签">ⓘ</span>
                            </label>
                        </div>
                    </div>
                    <div class="right-section d-flex gap-2">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none;">删除</button>
                        <button type="button" class="btn btn-primary" id="submitBtn">提交</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分类管理模态框 -->
    <div class="modal fade" id="categoryManageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📁 分类管理</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- 新增分类折叠区域 -->
                    <div class="card mb-3">
                        <div class="card-header" id="toggleAddCategoryBtn" style="cursor: pointer;">
                            <i class="fas fa-plus"></i> 新增分类
                        </div>
                        <div id="addCategoryForm" style="display: none;">
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">分类名称</label>
                                    <input type="text" class="form-control" id="newCategoryNameInput" placeholder="输入分类名称">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">分类图标</label>
                                    <select class="form-select" id="newCategoryIconSelect">
                                        <optgroup label="📁 名词分类">
                                            <option value="fas fa-folder">文件夹 (默认)</option>
                                            <option value="fas fa-image">图片</option>
                                            <option value="fas fa-music">音乐</option>
                                            <option value="fas fa-video">视频</option>
                                            <option value="fas fa-file-alt">文档</option>
                                            <option value="fas fa-gamepad">游戏</option>
                                            <option value="fas fa-heart">收藏</option>
                                        </optgroup>
                                        <optgroup label="🎯 动词分类">
                                            <option value="fas fa-book-open">阅读</option>
                                            <option value="fas fa-headphones">聆听</option>
                                            <option value="fas fa-eye">观看</option>
                                            <option value="fas fa-graduation-cap">学习</option>
                                            <option value="fas fa-download">下载</option>
                                            <option value="fas fa-search">搜索</option>
                                        </optgroup>
                                        <option value="custom">✏️ 自定义输入</option>
                                    </select>
                                    <div class="position-relative">
                                        <input type="text" id="newCategoryCustomIconManage" class="form-control mt-2" placeholder="图标类名或图标链接" style="display: none;">
                                        <div id="iconSuggestions" class="icon-suggestions" style="display: none;"></div>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">上级分类 (可选)</label>
                                    <select class="form-select" id="newCategoryParentSelect">
                                        <option value="">-- 无 (一级分类) --</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">
                                        优先级<span class="info-icon" data-tip="数字越小优先级越高">ⓘ</span>
                                    </label>
                                    <input type="number" class="form-control priority-input" id="newCategoryPriority" value="100" min="0" step="1">
                                </div>
                                <div class="mb-3">
                                    <button class="btn btn-primary" id="saveNewCategoryBtn" title="保存分类"><i class="fas fa-save"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 分类列表 -->
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>图标</th>
                                <th>分类名称</th>
                                <th>上级分类</th>
                                <th>优先级</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="categoryListContainer">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 本地 Bootstrap JS -->
    <script src="/static/bootstrap/bootstrap.bundle.min.js"></script>
    <!-- 自定义脚本 -->
    <script src="/static/script.js"></script>
</body>
</html>
